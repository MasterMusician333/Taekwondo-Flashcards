<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Taekwondo Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<header class="app-header">
  <h1>Taekwondo Flashcards</h1>
  <p>Personal/studio flashcards for Korean terminology and belt testing.</p>
</header>

<main>
  <section class="panel">
    <h2>Add / Edit Card</h2>
    <input id="editId" type="hidden" />

    <label for="korean">Korean term</label>
    <input id="korean" placeholder="Example: Charyot" />

    <label for="english">English meaning</label>
    <input id="english" placeholder="Example: Attention" />

    <label for="pronunciation">Pronunciation</label>
    <input id="pronunciation" placeholder="Optional" />

    <label for="notes">Notes</label>
    <textarea id="notes" placeholder="Optional notes"></textarea>

    <label for="category">Category</label>
    <input id="category" placeholder="Commands, Kicks, Blocks, Forms, Numbers..." />

    <label for="rank">Rank / Belt Section</label>
    <select id="rank"></select>

    <details open>
      <summary>Belt appearance</summary>

      <label for="beltColor">Main belt color</label>
      <select id="beltColor">
        <option value="white">White</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="brown">Brown</option>
        <option value="red">Red</option>
        <option value="black">Black</option>
      </select>

      <label for="stripeColor">Horizontal center stripe</label>
      <select id="stripeColor">
        <option value="">None</option>
        <option value="white">White</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="brown">Brown</option>
        <option value="red">Red</option>
        <option value="black">Black</option>
      </select>

      <label for="tips">Tips, comma separated</label>
      <input id="tips" placeholder="Example: yellow,yellow,green,green" />
      <div id="beltPreview" class="preview-box"></div>
    </details>

    <div class="button-row">
      <button id="saveBtn">Save Card</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>

    <p id="saveMessage" class="save-message"></p>
  </section>

  <section class="panel">
    <h2>Study</h2>

    <label for="studyFilter">Study section</label>
    <select id="studyFilter"></select>

    <label for="startSide">Start side</label>
    <select id="startSide">
      <option value="korean">Korean → English</option>
      <option value="english">English → Korean</option>
      <option value="random">Random side first</option>
    </select>

    <label for="studyOrder">Order</label>
    <select id="studyOrder">
      <option value="sequential">Sequential</option>
      <option value="random">Random</option>
    </select>

    <label for="cardPicker">Choose individual card</label>
    <select id="cardPicker"></select>

    <div class="study-info">
      <span id="counter">No cards yet</span>
    </div>

    <div class="flashcard-wrap">
      <div id="flashcard" class="flashcard" tabindex="0">
        <div class="flashcard-inner">
          <div class="flashcard-face flashcard-front">
            <div id="frontBelt"></div>
            <div class="card-word" id="frontText"></div>
            <div class="hint">Tap to flip</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div id="backBelt"></div>
            <div class="card-word" id="backText"></div>
            <div class="card-extra" id="backExtra"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="button-row nav-row">
      <button id="prevBtn">◀ Previous</button>
      <button id="flipBtn" class="secondary">Flip</button>
      <button id="nextBtn">Next ▶</button>
    </div>

    <div class="button-row">
      <button id="knowBtn" class="success">Know It</button>
      <button id="practiceBtn" class="warning">Need Practice</button>
    </div>
  </section>

  <section class="panel saved-panel">
    <h2>Saved Cards <span id="cardCountBadge">0</span></h2>
    <p class="small-note">Cards you save appear below. They are stored on this device/browser unless you export a backup.</p>
    <div class="button-row">
      <button id="exportBtn" class="secondary">Export Backup</button>
      <button id="importBtn" class="secondary">Import Backup</button>
    </div>
    <input id="importFile" type="file" accept="application/json" hidden />
    <div id="cardList"></div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
