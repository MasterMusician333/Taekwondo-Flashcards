<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Taekwondo Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<header class="topbar">
  <button id="menuBtn" class="menu-btn">☰</button>
  <div>
    <h1>TKD Flashcards</h1>
    <p id="statusLine">No cards saved yet</p>
  </div>
</header>

<div id="drawerShade" class="drawer-shade"></div>

<aside id="drawer" class="drawer">
  <h2>Study Menu</h2>

  <label for="studyFilter">Rank / Section</label>
  <select id="studyFilter"></select>

  <label for="cardPicker">Flashcard</label>
  <select id="cardPicker"></select>

  <label for="startSide">Start Side</label>
  <select id="startSide">
    <option value="korean">Korean → English</option>
    <option value="english">English → Korean</option>
    <option value="random">Random side first</option>
  </select>

  <label for="studyOrder">Order</label>
  <select id="studyOrder">
    <option value="sequential">Sequential</option>
    <option value="random">Random</option>
  </select>

  <button id="addScreenBtn">Add / Edit Cards</button>
  <button id="studyScreenBtn" class="secondary">Study Screen</button>
  <button id="exportBtn" class="secondary">Export Backup</button>
  <button id="importBtn" class="secondary">Import Backup</button>
  <input id="importFile" type="file" accept="application/json" hidden />
</aside>

<main>
  <section id="studyScreen" class="screen active">
    <div class="counter" id="counter">No cards yet</div>

    <div class="flashcard-wrap">
      <div id="flashcard" class="flashcard" tabindex="0">
        <div class="flashcard-inner">
          <div class="flashcard-face flashcard-front">
            <div id="frontBelt"></div>
            <div class="card-word" id="frontText">Add a card to begin</div>
            <div class="hint">Tap to flip</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div id="backBelt"></div>
            <div class="card-word" id="backText"></div>
            <div class="card-extra" id="backExtra"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="button-row nav-row">
      <button id="prevBtn">◀ Previous</button>
      <button id="flipBtn" class="secondary">Flip</button>
      <button id="nextBtn">Next ▶</button>
    </div>

    <div class="button-row">
      <button id="knowBtn" class="success">Know It</button>
      <button id="practiceBtn" class="warning">Need Practice</button>
    </div>
  </section>

  <section id="editScreen" class="screen">
    <div class="panel">
      <h2>Add / Edit Card</h2>
      <p class="note">Cards are saved on this device/browser. After saving, they appear in the Saved Cards list below and in the side menu.</p>

      <input id="editId" type="hidden" />

      <label for="korean">Korean term</label>
      <input id="korean" placeholder="Example: Charyot" />

      <label for="english">English meaning</label>
      <input id="english" placeholder="Example: Attention" />

      <label for="pronunciation">Pronunciation</label>
      <input id="pronunciation" placeholder="Optional" />

      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Optional notes"></textarea>

      <label for="category">Category</label>
      <input id="category" placeholder="Commands, Kicks, Blocks, Forms, Numbers..." />

      <details open>
        <summary>Custom Belt Appearance / Rank Details</summary>

        <label for="rankText">Rank name / belt section</label>
        <input id="rankText" list="rankOptions" placeholder="Example: 1st Dan, Yellow / Green Tip, Custom" />
        <datalist id="rankOptions"></datalist>

        <label for="danDesignation">Dan designation</label>
        <select id="danDesignation">
          <option value="">None / color belt</option>
          <option>1st Dan</option>
          <option>2nd Dan</option>
          <option>3rd Dan</option>
          <option>4th Dan</option>
          <option>5th Dan</option>
          <option>6th Dan</option>
          <option>7th Dan</option>
          <option>8th Dan</option>
          <option>9th Dan</option>
          <option>10th Dan</option>
        </select>

        <label for="beltColor">Main belt color</label>
        <select id="beltColor">
          <option value="white">White</option>
          <option value="yellow">Yellow</option>
          <option value="green">Green</option>
          <option value="blue">Blue</option>
          <option value="brown">Brown</option>
          <option value="red">Red</option>
          <option value="black">Black</option>
        </select>

        <label for="stripeColor">Horizontal center stripe</label>
        <select id="stripeColor">
          <option value="">None</option>
          <option value="white">White</option>
          <option value="yellow">Yellow</option>
          <option value="green">Green</option>
          <option value="blue">Blue</option>
          <option value="brown">Brown</option>
          <option value="red">Red</option>
          <option value="black">Black</option>
        </select>

        <label for="tips">Tips, comma separated</label>
        <input id="tips" placeholder="Example: yellow,yellow,green,green" />

        <button id="applyDanBtn" type="button" class="secondary">Auto-fill selected Dan belt</button>

        <div id="beltPreview" class="preview-box"></div>
      </details>

      <div class="button-row">
        <button id="saveBtn">Save Card</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>

      <p id="saveMessage" class="save-message"></p>
    </div>

    <div class="panel">
      <h2>Saved Cards <span id="cardCountBadge">0</span></h2>
      <div id="cardList"></div>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
